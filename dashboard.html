  <script>
    const backendUrl = 'https://random-8jtr0timo8xt8.vertraweb.app';
    const token = localStorage.getItem('token') || localStorage.getItem('access_token');

    // Partículas
    const canvas = document.querySelector('.particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = Math.random() * 2 - 1;
        this.speedY = Math.random() * 2 - 1;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = 'rgba(220,30,30,0.8)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    let particles = [];
    function initParticles() {
      particles = [];
      for (let i = 0; i < 170; i++) particles.push(new Particle());
    }
    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      initParticles();
    });
    initParticles();
    animateParticles();

    // Atualizar visão geral
    function updateStats(online, total, plano) {
      document.getElementById('membros-online').textContent = online || 0;
      document.getElementById('total-membros').textContent = total || 0;
      document.getElementById('plano-selecionado').textContent = plano || 'Free';
    }

    // Carregar perfil e servidores automaticamente
    async function loadDashboard() {
      if (!token) {
        alert('Você precisa estar logado para acessar a dashboard.');
        window.location.href = '/';
        return;
      }

      try {
        // Carregar perfil do usuário
        const userRes = await fetch('https://discord.com/api/users/@me', {
          headers: { Authorization: `Bearer ${token}` }
        });
        const user = await userRes.json();

        document.getElementById('user-avatar').src = user.avatar 
          ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`
          : 'https://cdn.discordapp.com/embed/avatars/0.png';
        document.getElementById('user-name').textContent = user.global_name || user.username;
        document.getElementById('user-id').textContent = `ID: ${user.id}`;
        document.getElementById('admin-servers').textContent = `Você administra ? servidores`; // Será atualizado abaixo

        // Carregar servidores
        const guildsRes = await fetch('https://discord.com/api/users/@me/guilds?with_counts=true', {
          headers: { Authorization: `Bearer ${token}` }
        });
        const guilds = await guildsRes.json();

        const guildList = document.getElementById('guild-list');
        guildList.innerHTML = '';

        let adminCount = 0;

        guilds.forEach(guild => {
          if ((guild.permissions & 0x8) === 0) return; // só admins

          adminCount++;

          const card = document.createElement('div');
          card.className = 'server-card glass p-6 flex justify-between items-center blood-border';
          card.innerHTML = `
            <div class="flex items-center">
              ${guild.icon 
                ? `<img src="https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png?size=64" class="w-16 h-16 rounded-full mr-6">`
                : '<div class="w-16 h-16 bg-gray-700 rounded-full mr-6 flex items-center justify-center text-2xl font-bold">V</div>'}
              <div>
                <p class="text-xl neon">${guild.name}</p>
                <p class="text-sm opacity-80">ID: ${guild.id}</p>
              </div>
            </div>
            <div class="text-right opacity-80">
              <p>Membros: ${guild.approximate_member_count || '?'}</p>
              <p>Online: ${guild.approximate_presence_count || '?'}</p>
            </div>
          `;

          card.onclick = () => {
            document.querySelectorAll('.server-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            updateStats(
              guild.approximate_presence_count || 0,
              guild.approximate_member_count || 0,
              'Free' // pode vir do backend depois
            );
          };

          guildList.appendChild(card);
        });

        document.getElementById('admin-servers').textContent = `Você administra ${adminCount} servidores`;

      } catch (e) {
        console.error(e);
        alert('Erro ao carregar dashboard. Verifique se está logado.');
      }
    }

    window.onload = loadDashboard;
  </script>
</body>
</html>
