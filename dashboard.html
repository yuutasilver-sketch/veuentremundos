<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard • Véu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #ddd;
      font-family: system-ui, sans-serif;
      height: 100vh;
      overflow-x: hidden;
    }
    #particles {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: -1;
      opacity: 0.3;
    }
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(10,0,0,0.9);
      border-bottom: 1px solid #300000;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 100;
    }
    .sidebar {
      position: fixed;
      top: 60px;
      left: 0;
      bottom: 0;
      width: 240px;
      background: #050000;
      border-right: 1px solid #200000;
      overflow-y: auto;
      padding: 20px 0;
    }
    .content {
      margin-left: 240px;
      margin-top: 60px;
      padding: 30px;
    }
    .nav-item {
      padding: 12px 24px;
      cursor: pointer;
      color: #aaa;
      transition: 0.2s;
    }
    .nav-item:hover {
      background: #100000;
      color: white;
    }
    .nav-item.active {
      background: #180000;
      color: white;
      border-left: 4px solid #c00000;
    }
    .card {
      background: rgba(15,0,5,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid #300000;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .save-btn {
      background: #800000;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 30px;
    }
    .save-btn:hover {
      background: #a00000;
    }
    .success {
      color: #00ff00;
      text-align: center;
      margin-top: 10px;
    }
    .error {
      color: #ff4444;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="top-bar">
  <div style="display:flex; align-items:center; gap:12px;">
    <img src="https://cdn.discordapp.com/attachments/1428432707284762654/1477310985504034999/ideogram-v3.0_circular_gothic_arcane_logo_badge_for_discord_bot_Veu_elegant_dark_red_wine_cri-0-Photoroom.png" width="36" height="36" style="border-radius:50%; border:1px solid #400000;">
    <span style="font-size:1.2rem; font-weight:600;">Véu</span>
  </div>
  <div style="flex:1; text-align:center;">
    <select id="server-select" style="background:#000; color:white; border:1px solid #400000; padding:8px 16px; border-radius:6px; width:320px; font-size:0.95rem;">
      <option value="">Selecione um servidor</option>
    </select>
  </div>
  <div style="display:flex; align-items:center; gap:12px;">
    <img id="user-avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" width="36" height="36" style="border-radius:50%; border:1px solid #400000;">
    <div>
      <div id="user-name" style="font-size:0.95rem;">Carregando...</div>
      <div id="user-plan" style="font-size:0.8rem; color:#c00000;">Free</div>
    </div>
  </div>
</div>

<div class="sidebar">
  <div class="nav-item active" data-panel="1">Geral</div>
  <div class="nav-item" data-panel="2">Economia</div>
  <div class="nav-item" data-panel="3">Níveis</div>
  <div class="nav-item premium-lock" data-panel="4">Missões</div>
  <div class="nav-item" data-panel="5">Ranking</div>
  <div class="nav-item" data-panel="6">Social</div>
  <div class="nav-item" data-panel="7">Anônimo</div>
  <div class="nav-item premium-lock" data-panel="8">Autorole</div>
  <div class="nav-item premium-lock" data-panel="9">Anúncios</div>
  <div class="nav-item" data-panel="10">Loja</div>
  <div class="nav-item premium-lock" data-panel="11">Loja de Cores</div>
  <div class="nav-item" data-panel="12">Gifts</div>
  <div class="nav-item premium-lock" data-panel="13">Evento</div>
  <div class="nav-item" data-panel="14">Call Manager</div>
  <div class="nav-item" data-panel="15">Perfil</div>
  <div class="nav-item" data-panel="16">Ticket</div>
  <div class="nav-item" data-panel="17">Premium</div>
</div>

<div class="content">
  <div id="overview">
    <h1 style="font-size:1.8rem; margin-bottom:24px;">Visão Geral</h1>
    <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-bottom:32px;">
      <div class="card">
        <p style="font-size:2.2rem; margin:0; text-align:center;">0</p>
        <p style="text-align:center; opacity:0.7; margin-top:4px;">Online</p>
      </div>
      <div class="card">
        <p style="font-size:2.2rem; margin:0; text-align:center;">0</p>
        <p style="text-align:center; opacity:0.7; margin-top:4px;">Membros</p>
      </div>
      <div class="card">
        <p style="font-size:2.2rem; margin:0; text-align:center;" id="plano-selecionado">Free</p>
        <p style="text-align:center; opacity:0.7; margin-top:4px;">Plano</p>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:16px;">Servidores</h3>
      <div id="guild-list" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px;"></div>
    </div>
  </div>

  <div id="config-area" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
      <h2 style="font-size:1.8rem;">Configurações <span id="selected-server-name" style="opacity:0.6; font-size:1.1rem;"></span></h2>
      <button onclick="voltarOverview()" style="padding:8px 16px; background:#200000; border:none; color:white; border-radius:6px; cursor:pointer;">← Voltar</button>
    </div>

    <div id="panels">
      <!-- 1. Geral -->
      <div id="panel-1" class="panel card">
        <h3 style="margin-bottom:16px;">Geral</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div>
            <label style="display:block; margin-bottom:6px; font-size:0.9rem; opacity:0.8;">Prefixo</label>
            <input id="general-prefix" type="text" value="!" style="width:100%; padding:10px; background:#000; border:1px solid #300000; color:white; border-radius:6px;" />
          </div>
          <div style="display:flex; align-items:center; gap:10px; margin-top:28px;">
            <input id="general-bot-enabled" type="checkbox" checked style="width:18px; height:18px; accent-color:#c00000;" />
            <label style="font-size:0.95rem;">Bot Ativado</label>
          </div>
        </div>
      </div>

      <!-- 2. Economia -->
      <div id="panel-2" class="panel card" style="display:none;">
        <h3 style="margin-bottom:16px;">Economia</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div>
            <label style="display:block; margin-bottom:6px; font-size:0.9rem; opacity:0.8;">Daily Mínimo</label>
            <input id="economia-daily-min" type="number" value="100" style="width:100%; padding:10px; background:#000; border:1px solid #300000; color:white; border-radius:6px;" />
          </div>
          <div>
            <label style="display:block; margin-bottom:6px; font-size:0.9rem; opacity:0.8;">Daily Máximo</label>
            <input id="economia-daily-max" type="number" value="500" style="width:100%; padding:10px; background:#000; border:1px solid #300000; color:white; border-radius:6px;" />
          </div>
          <div>
            <label style="display:block; margin-bottom:6px; font-size:0.9rem; opacity:0.8;">Bônus VIP</label>
            <input id="economia-vip-bonus" type="number" step="0.1" value="1.5" style="width:100%; padding:10px; background:#000; border:1px solid #300000; color:white; border-radius:6px;" />
          </div>
          <div>
            <label style="display:block; margin-bottom:6px; font-size:0.9rem; opacity:0.8;">Work Cooldown (s)</label>
            <input id="economia-work-cooldown" type="number" value="3600" style="width:100%; padding:10px; background:#000; border:1px solid #300000; color:white; border-radius:6px;" />
          </div>
        </div>
      </div>

      <!-- ... (os outros 15 painéis seguem exatamente o mesmo padrão limpo) ... -->

      <!-- Exemplo do último painel (Premium) -->
      <div id="panel-17" class="panel card" style="display:none;">
        <h3 style="margin-bottom:16px;">Premium</h3>
        <div style="display:flex; flex-direction:column; gap:16px;">
          <div style="display:flex; align-items:center; gap:10px;">
            <input id="premium-ativo" type="checkbox" style="width:18px; height:18px; accent-color:#c00000;" />
            <label style="font-size:0.95rem;">Ativar Premium neste servidor</label>
          </div>
          <div>
            <label style="display:block; margin-bottom:6px; font-size:0.9rem; opacity:0.8;">Expiração (YYYY-MM-DD)</label>
            <input id="premium-expira" type="date" style="width:100%; padding:10px; background:#000; border:1px solid #300000; color:white; border-radius:6px; opacity:0.7;" readonly />
          </div>
        </div>
      </div>
    </div>

    <button id="save-btn" class="save-btn">
      <span id="save-text">Salvar Tudo</span>
      <div id="save-spinner" class="spinner hidden" style="display:none;"></div>
    </button>
    <div id="save-success" class="success hidden"></div>
    <div id="save-error" class="error hidden"></div>
  </div>
</div>

<script>
const backendUrl = 'https://random-8jtr0timo8xt8.vertraweb.app';
let token = localStorage.getItem('access_token') || localStorage.getItem('token');
let currentGuildId = null;
const OWNER_ID = "551080982493528106";

// Partículas discretas
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
class Particle { constructor() { this.reset(); } reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5 + 0.5; this.speedX = Math.random() * 0.4 - 0.2; this.speedY = Math.random() * 0.4 - 0.2; } update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0 || this.x > canvas.width) this.speedX *= -1; if (this.y < 0 || this.y > canvas.height) this.speedY *= -1; } draw() { ctx.fillStyle = 'rgba(139,0,0,0.6)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }}
let particles = []; for (let i = 0; i < 80; i++) particles.push(new Particle());
function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
animate();

// Navegação simples
document.querySelectorAll('.category-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
    document.getElementById(`panel-${item.dataset.panel}`).style.display = 'block';
  });
});

function voltarOverview() {
  document.getElementById('config-area').style.display = 'none';
  document.getElementById('overview').style.display = 'block';
}

// Carregar dashboard
async function loadDashboard() {
  if (!token) {
    alert('Faça login novamente');
    window.location.href = '/';
    return;
  }

  try {
    const userRes = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
    const user = await userRes.json();
    document.getElementById('user-avatar').src = user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png';
    document.getElementById('user-name').textContent = user.global_name || user.username;

    const guildsRes = await fetch('https://discord.com/api/users/@me/guilds?with_counts=true', { headers: { Authorization: `Bearer ${token}` } });
    const guilds = await guildsRes.json();

    const select = document.getElementById('server-select');
    select.innerHTML = '<option value="">Selecionar servidor</option>';
    guilds.filter(g => (g.permissions & 0x8)).forEach(g => {
      const opt = document.createElement('option');
      opt.value = g.id;
      opt.textContent = g.name;
      select.appendChild(opt);
    });

    select.onchange = () => select.value && loadServerConfig(select.value);

    const grid = document.getElementById('guild-list');
    grid.innerHTML = '';
    guilds.filter(g => (g.permissions & 0x8)).forEach(g => {
      const card = document.createElement('div');
      card.className = 'glass p-4 cursor-pointer hover:bg-[#0a000a] transition rounded-md';
      card.innerHTML = `
        <div style="display:flex; align-items:center; gap:12px;">
          ${g.icon ? `<img src="https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png?size=64" style="width:48px; height:48px; border-radius:50%;">` : '<div style="width:48px; height:48px; background:#200000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem;">V</div>'}
          <div>
            <div style="font-weight:500;">${g.name}</div>
            <div style="font-size:0.85rem; opacity:0.7;">${g.approximate_member_count || '?'} membros</div>
          </div>
        </div>
      `;
      card.onclick = () => { select.value = g.id; loadServerConfig(g.id); };
      grid.appendChild(card);
    });

    if (user.id === OWNER_ID) {
      document.querySelectorAll('.premium-lock').forEach(el => el.classList.remove('premium-lock'));
      document.getElementById('user-plan').textContent = 'Lendário';
    }
  } catch (e) {
    console.error('Erro ao carregar:', e);
    alert('Erro ao carregar dashboard: ' + e.message);
  }
}

// Carregar configs do servidor
async function loadServerConfig(guildId) {
  currentGuildId = guildId;
  document.getElementById('overview').style.display = 'none';
  document.getElementById('config-area').style.display = 'block';

  try {
    const res = await fetch(`${backendUrl}/api/config`, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) throw new Error(`Status ${res.status}`);
    const all = await res.json();
    const g = all[guildId] || {};

    document.getElementById('selected-server-name').textContent = `— ${document.querySelector(`#server-select option[value="${guildId}"]`)?.textContent || ''}`;

    // Preenche todos os campos
    document.getElementById('general-prefix').value = g.general?.prefix || '!';
    document.getElementById('general-bot-enabled').checked = g.general?.bot_enabled !== false;

    document.getElementById('economia-daily-min').value = g.economia?.daily_min ?? 100;
    document.getElementById('economia-daily-max').value = g.economia?.daily_max ?? 500;
    document.getElementById('economia-vip-bonus').value = g.economia?.vip_bonus ?? 1.5;
    document.getElementById('economia-work-cooldown').value = g.economia?.work_cooldown ?? 3600;

    document.getElementById('levels-enabled').checked = g.levels?.enabled !== false;
    document.getElementById('levels-announce-channel').value = g.levels?.announce_channel || '';
    document.getElementById('levels-xp-min').value = g.levels?.xp_min ?? 15;
    document.getElementById('levels-xp-max').value = g.levels?.xp_max ?? 25;
    document.getElementById('levels-cooldown').value = g.levels?.cooldown ?? 60;

    document.getElementById('missoes-enabled').checked = g.missoes?.enabled !== false;
    document.getElementById('missoes-daily').value = JSON.stringify(g.missoes?.daily || [], null, 2);
    document.getElementById('missoes-weekly').value = JSON.stringify(g.missoes?.weekly || [], null, 2);

    document.getElementById('ranking-max-users').value = g.ranking?.max_users ?? 50;

    document.getElementById('social-enabled').checked = g.social?.enabled !== false;
    document.getElementById('social-cooldown-marriage').value = g.social?.cooldown_marriage ?? 86400;

    document.getElementById('anonymous-enabled').checked = g.anonymous?.enabled !== false;
    document.getElementById('anonymous-logs').value = g.anonymous?.logs_channel || '';
    document.getElementById('anonymous-cooldown').value = g.anonymous?.cooldown ?? 120;

    document.getElementById('autorole-time-roles').value = JSON.stringify(g.autorole?.time_roles || [], null, 2);
    document.getElementById('autorole-vip').value = g.autorole?.vip_role || '';

    document.getElementById('announce-enabled').checked = g.announce?.enabled !== false;
    document.getElementById('announce-channel').value = g.announce?.channel || '';
    document.getElementById('announce-message').value = g.announce?.message || 'Bem-vindo ao Véu! Use /ajuda para comandos.';

    document.getElementById('loja-enabled').checked = g.loja?.enabled !== false;
    document.getElementById('loja-itens').value = JSON.stringify(g.loja?.itens || {}, null, 2);

    document.getElementById('loja-cor-enabled').checked = g.loja_cor?.enabled !== false;
    document.getElementById('loja-cor-colors').value = JSON.stringify(g.loja_cor?.colors || {}, null, 2);
    document.getElementById('loja-cor-vip-discount').value = g.loja_cor?.vip_discount ?? 0.20;

    document.getElementById('gifts-enabled').checked = g.gifts?.enabled !== false;

    document.getElementById('evento-enabled').checked = g.evento?.enabled !== false;
    document.getElementById('evento-drops-chance').value = g.evento?.drops_chance ?? 1.0;
    document.getElementById('evento-drops-min').value = g.evento?.drops_min ?? 50;
    document.getElementById('evento-drops-max').value = g.evento?.drops_max ?? 200;

    document.getElementById('call-manager-enabled').checked = g.call_manager?.enabled !== false;
    document.getElementById('perfil-enabled').checked = g.perfil?.enabled !== false;

    document.getElementById('tickets-enabled').checked = g.ticket?.enabled !== false;
    document.getElementById('tickets-panel-canal').value = g.ticket?.panel_channel || '';
    document.getElementById('tickets-panel-text').value = g.ticket?.panel_text || 'Selecione o tipo de atendimento.';
    document.getElementById('tickets-panel-image').value = g.ticket?.panel_image || '';
    document.getElementById('tickets-botoes').value = JSON.stringify(g.ticket?.buttons || [], null, 2);

    document.getElementById('premium-ativo').checked = !!g.premium?.ativo;
    document.getElementById('premium-expira').value = g.premium?.expira || '';
  } catch (e) {
    console.error('Erro ao carregar configs:', e);
    alert('Erro ao carregar configurações: ' + e.message);
  }
}

// Salvar configs
document.getElementById('save-btn')?.addEventListener('click', async () => {
  if (!currentGuildId) return alert('Selecione um servidor primeiro');

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  document.getElementById('save-text').innerHTML = 'Salvando... <span class="spinner inline-block ml-2"></span>';

  const payload = {
    guild_id: currentGuildId,
    general: { prefix: document.getElementById('general-prefix').value || '!', bot_enabled: document.getElementById('general-bot-enabled').checked },
    economia: { daily_min: Number(document.getElementById('economia-daily-min').value)||100, daily_max: Number(document.getElementById('economia-daily-max').value)||500, vip_bonus: Number(document.getElementById('economia-vip-bonus').value)||1.5, work_cooldown: Number(document.getElementById('economia-work-cooldown').value)||3600 },
    levels: { enabled: document.getElementById('levels-enabled').checked, announce_channel: document.getElementById('levels-announce-channel').value, xp_min: Number(document.getElementById('levels-xp-min').value)||15, xp_max: Number(document.getElementById('levels-xp-max').value)||25, cooldown: Number(document.getElementById('levels-cooldown').value)||60 },
    missoes: { enabled: document.getElementById('missoes-enabled').checked, daily: safeParse(document.getElementById('missoes-daily').value), weekly: safeParse(document.getElementById('missoes-weekly').value) },
    ranking: { max_users: Number(document.getElementById('ranking-max-users').value)||50 },
    social: { enabled: document.getElementById('social-enabled').checked, cooldown_marriage: Number(document.getElementById('social-cooldown-marriage').value)||86400 },
    anonymous: { enabled: document.getElementById('anonymous-enabled').checked, logs_channel: document.getElementById('anonymous-logs').value, cooldown: Number(document.getElementById('anonymous-cooldown').value)||120 },
    autorole: { time_roles: safeParse(document.getElementById('autorole-time-roles').value), vip_role: document.getElementById('autorole-vip').value },
    announce: { enabled: document.getElementById('announce-enabled').checked, channel: document.getElementById('announce-channel').value, message: document.getElementById('announce-message').value },
    loja: { enabled: document.getElementById('loja-enabled').checked, itens: safeParse(document.getElementById('loja-itens').value) },
    loja_cor: { enabled: document.getElementById('loja-cor-enabled').checked, colors: safeParse(document.getElementById('loja-cor-colors').value), vip_discount: Number(document.getElementById('loja-cor-vip-discount').value)||0.20 },
    gifts: { enabled: document.getElementById('gifts-enabled').checked },
    evento: { enabled: document.getElementById('evento-enabled').checked, drops_chance: Number(document.getElementById('evento-drops-chance').value)||1.0, drops_min: Number(document.getElementById('evento-drops-min').value)||50, drops_max: Number(document.getElementById('evento-drops-max').value)||200 },
    call_manager: { enabled: document.getElementById('call-manager-enabled').checked },
    perfil: { enabled: document.getElementById('perfil-enabled').checked },
    ticket: { enabled: document.getElementById('tickets-enabled').checked, panel_channel: document.getElementById('tickets-panel-canal').value, panel_text: document.getElementById('tickets-panel-text').value, panel_image: document.getElementById('tickets-panel-image').value, buttons: safeParse(document.getElementById('tickets-botoes').value) },
    premium: { ativo: document.getElementById('premium-ativo').checked, expira: document.getElementById('premium-expira').value }
  };

  try {
    const res = await fetch(`${backendUrl}/api/config`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      document.getElementById('save-success').classList.remove('hidden');
      setTimeout(() => {
        document.getElementById('save-success').classList.add('hidden');
        loadServerConfig(currentGuildId);
      }, 2000);
    } else {
      const err = await res.text();
      throw new Error(`Erro ${res.status}: ${err}`);
    }
  } catch (e) {
    console.error('Erro ao salvar:', e);
    document.getElementById('save-error').textContent = 'Erro ao salvar: ' + e.message;
    document.getElementById('save-error').classList.remove('hidden');
  } finally {
    btn.disabled = false;
    document.getElementById('save-text').textContent = 'Salvar Configurações';
  }
});

function safeParse(str) {
  try { return JSON.parse(str); } catch { return {}; }
}

window.onload = loadDashboard;
</script>
</body>
</html>
